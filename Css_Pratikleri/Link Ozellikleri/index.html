<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* link ilk hali*/
        a:link{
            color:red;
            text-decoration: none;
        }
        /* linkin üzerine imleç ile gelindiğinde*/
        a:hover{
            color: orange;
        }
        /* linkin üzerine tıklanıldığında*/
        a:active{
            color: blue;
            background-color: antiquewhite;
        }
        /*site ziyaret edildikten sonra*/
        a:visited{
            color: blueviolet;
        }
    </style>
</head>
<body>
    <a href="https://www.google.com.tr">Google</a>
</body>
</html>
