<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .metin{
            color: brown;
            background-color: antiquewhite;
            text-align: center;
            font-weight: bold;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-decoration: underline;
            word-spacing: 10px;
        }
    </style>
</head>
<body>
    
    <!--
    **css'de**
    1-color
    2-background-color
    3-text-align
    4-font-weight : yazıyı kalınlaştırır html'de <b> ve <strong> ile yapıyorduk
    5-font-family : yazı tipi
    6-font-style  : normal veya italic , html'de <i> ile yaparız
    7-text-transform : yazının bütün harflerini büyük veya küçük harfe çevirebiliriz
    uppercase-> büyük harfe çevirir, lowercase->küçük harfe çevirir
    8-letter-spacing : harflerin arsına boşluk atar
    9-text-decoration  :   underline -> altına çizgi çeker , overline -> üstüne çizgi çeker , line-through -> ortasından çizgi çeker
    10-word-spacing : kelimelerin arasındaki boşluk
    -->

    <p class="metin">Başarı bedel gerektirir.</p>
</body>
</html>
